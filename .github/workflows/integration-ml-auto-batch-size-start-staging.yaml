name: Integration ML - Auto Batch Size (Staging)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  discover-algorithms:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}
    - name: List auto batch size cases
      id: list
      env:
        STAGING_BRANCH: ${{ github.ref_name }}
      run: |
        pip install pyyaml -q
        python3 << 'EOF' >> $GITHUB_OUTPUT
        import json
        import os

        import yaml

        staging_branch = os.environ["STAGING_BRANCH"]

        with open("tests/integration/ml/auto_batch_size_cases.yaml") as f:
            matrix = yaml.safe_load(f)["cases"]

        for case in matrix:
            case["environment"] = "staging"
            case["python-version"] = "3.11"
            case["test-harness-ref"] = staging_branch

        print("matrix=" + json.dumps(matrix))
        EOF

  start-training:
    needs: [discover-algorithms]
    runs-on: ubuntu-24.04
    # Allow for up to 5 attempts with 30-minute waits between GPU-capacity
    # retries, plus the training run itself.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-algorithms.outputs.matrix) }}

    steps:
    - name: Show disk space
      run: df -h /

    - name: Install system packages
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils xvfb libgl1-mesa-dev libgl1 libosmesa6-dev

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ matrix.test-harness-ref }}
    - name: Pull LFS objects
      run: git lfs pull

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      id: setup-python
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set up neuracore with Rust data daemon
      uses: NeuracoreAI/shared-workflows/actions/setup-neuracore-daemon-from-source@main
      with:
        checkout: "false"
        path: "."
        extras: dev,ml,examples

    - name: Resolve test harness
      run: |
        echo "TEST_HARNESS_PATH=tests/integration/ml/test_auto_batch_size.py" >> "$GITHUB_ENV"
        echo "Test harness environment: staging"
        echo "Test harness ref: ${{ matrix.test-harness-ref }}"
        echo "Test harness commit: $(git rev-parse HEAD)"
        echo "Test harness path: tests/integration/ml/test_auto_batch_size.py"
        python - << 'EOF'
        import neuracore

        print(f"Installed neuracore version: {neuracore.__version__}")
        EOF

    - name: Start training and wait for terminal status (retry if no GPU)
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NCD_RUST_DAEMON: "1"
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
        TEST_CASE: ${{ matrix.algorithm }}_${{ matrix.gpu_type }}
        MAX_ATTEMPTS: "5"
        RETRY_WAIT_SECONDS: "1800"  # 30 minutes
      run: |
        set -uo pipefail
        set +e

        wait_log="$RUNNER_TEMP/wait.log"
        start_output="$RUNNER_TEMP/start_output.txt"
        gpu_unavailable_pattern='No GPUs? available'
        export GITHUB_OUTPUT="$start_output"

        run_phase() {
          pytest \
            -o log_cli=true \
            --log-cli-level=INFO \
            --log-cli-format="%(asctime)s %(levelname)-8s [%(name)s] %(message)s" \
            --log-cli-date-format="%H:%M:%S" \
            -vv \
            "$TEST_HARNESS_PATH::TestAutoBatchSize::${1}[${TEST_CASE}]"
        }

        attempt=1
        while [ "$attempt" -le "$MAX_ATTEMPTS" ]; do
          echo "::group::[$TEST_CASE] Attempt $attempt of $MAX_ATTEMPTS"
          rm -f "$wait_log" "$start_output"

          run_phase test_start_training
          start_rc=$?
          if [ "$start_rc" -ne 0 ]; then
            echo "::endgroup::"
            echo "::error::[$TEST_CASE] Failed to start training job (exit $start_rc)."
            exit "$start_rc"
          fi

          training_job_id="$(sed -n 's/^training_job_id=//p' "$start_output" | tail -n1)"
          if [ -z "$training_job_id" ]; then
            echo "::endgroup::"
            echo "::error::[$TEST_CASE] Could not determine training_job_id."
            exit 1
          fi
          echo "[$TEST_CASE] Started training job $training_job_id"

          export TRAINING_JOB_ID="$training_job_id"
          run_phase test_wait_for_training_terminal_status 2>&1 | tee "$wait_log"
          wait_rc=$?
          unset TRAINING_JOB_ID
          echo "::endgroup::"

          if [ "$wait_rc" -eq 0 ]; then
            echo "[$TEST_CASE] Training completed successfully on attempt $attempt."
            exit 0
          fi

          # Classify the failure: only "no GPU available" is retryable.
          if grep -qiE "$gpu_unavailable_pattern" "$wait_log"; then
            echo "[$TEST_CASE] Attempt $attempt failed: no GPU available."
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "[$TEST_CASE] Waiting ${RETRY_WAIT_SECONDS}s before retrying..."
              sleep "$RETRY_WAIT_SECONDS"
            fi
            attempt=$((attempt + 1))
            continue
          fi

          # Anything else is a genuine failure: stop now and surface why, so a
          # misclassified failure is visible in the log instead of an opaque exit.
          echo "::error::[$TEST_CASE] Training failed for a non-GPU reason (exit $wait_rc)."
          echo "[$TEST_CASE] ----- last 40 lines of wait output -----"
          tail -n 40 "$wait_log" || true
          exit "$wait_rc"
        done

        echo "::error::[$TEST_CASE] gpu not available"
        {
          echo "### ❌ ${TEST_CASE}: gpu not available"
          echo ""
          echo "No GPU was available after ${MAX_ATTEMPTS} attempts, "
          echo "waiting ${RETRY_WAIT_SECONDS}s between attempts."
        } >> "$GITHUB_STEP_SUMMARY"
        exit 1

    - name: Show disk space after tests
      if: always()
      run: df -h /
