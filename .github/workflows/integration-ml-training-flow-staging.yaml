name: Integration ML - Training Flow (Staging)

on:
  schedule:
    - cron: "0 1 * * *"  # 1. test_training_flow.py
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    runs-on: ubuntu-24.04
    env:
      NCD_RUST_DAEMON: "1"
    # TODO: NDD has socket issue when running in parallel
    #   in CommunicationsManager when calling create_producer_socket()

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout test harness
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Pull LFS objects
        run: git lfs pull

      - name: Set up Python 3.11
        id: setup-python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Build Rust daemon artefacts
        env:
          PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
        run: ./rust/scripts/build_wheel_artefacts.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir ".[dev,ml,examples]"

      - name: Resolve test harness
        run: |
          echo "Test harness environment: staging"
          echo "Test harness ref: ${{ github.ref_name }}"
          echo "Test harness commit: $(git rev-parse HEAD)"
          echo "Test harness path: tests/integration/ml/test_training_flow.py"
          python - << 'EOF'
          import neuracore

          print(f"Installed neuracore version: {neuracore.__version__}")
          EOF

      - name: Smoke-check Rust daemon selection
        run: |
          python - << 'EOF'
          from neuracore.data_daemon.rust_selection import (
              rust_daemon_binary_path,
              rust_daemon_enabled,
          )

          assert rust_daemon_enabled(), "Expected NCD_RUST_DAEMON to enable Rust daemon"
          binary_path = rust_daemon_binary_path()
          assert binary_path is not None and binary_path.is_file(), binary_path

          import neuracore.data_daemon._native_producer as native_producer

          print("Rust daemon enabled:", rust_daemon_enabled())
          print("Bundled binary:", binary_path)
          print("Native producer:", native_producer)
          EOF

      - name: Run Integration Test
        env:
          NEURACORE_API_URL: https://staging.api.neuracore.com/api
          NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
          NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
          NEURACORE_ENDPOINT_TIMEOUT: 30
          DISPLAY: :0
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils xvfb libgl1-mesa-dev libgl1 libosmesa6-dev
          Xvfb $DISPLAY -screen 0 1280x1024x24 &
          pytest \
            -o log_cli=true \
            --log-cli-level=INFO \
            --log-cli-format="%(asctime)s %(levelname)-8s [%(name)s] %(message)s" \
            --log-cli-date-format="%H:%M:%S" \
            -v \
            tests/integration/ml/test_training_flow.py
