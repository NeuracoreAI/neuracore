name: Integration ML - Algorithm Performance Start Training (Staging)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  discover-algorithms:
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}
    - name: List algorithm names
      id: list
      env:
        STAGING_BRANCH: ${{ github.ref_name }}
      run: |
        pip install pyyaml -q
        python3 << 'EOF' >> $GITHUB_OUTPUT
        import json
        import os

        import yaml

        staging_branch = os.environ["STAGING_BRANCH"]

        with open("tests/integration/ml/algorithm_configs.yaml") as f:
            staging_config = yaml.safe_load(f)

        matrix = [
            {
                "algorithm": algorithm["name"],
                "environment": "staging",
                "python-version": "3.11",
                "test-harness-ref": staging_branch,
            }
            for algorithm in staging_config["algorithms"]
        ]

        print("matrix=" + json.dumps(matrix))
        EOF

  start-training:
    needs: [discover-algorithms]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-algorithms.outputs.matrix) }}

    steps:
    - name: Show disk space
      run: df -h /

    - name: Install system packages
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libxml2-utils xvfb libgl1-mesa-dev libgl1 libosmesa6-dev

    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ matrix.test-harness-ref }}
    - name: Pull LFS objects
      run: git lfs pull

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust

    # Build the standalone daemon binary before `pip install .` so the
    # [tool.maturin] include bundles it into the built wheel; without it the
    # SDK silently falls back to the Python daemon.
    - name: Build Rust data-daemon binary
      run: bash rust/scripts/build_wheel_artefacts.sh

    - name: Install Python dependencies
      run: |
        python -m pip install --no-cache-dir --upgrade pip
        pip install --no-cache-dir ".[dev,ml,examples]"

    # cd away from the repo root so `import neuracore` resolves to the
    # installed wheel, not the source tree the binary was staged into.
    - name: Verify bundled Rust daemon
      run: |
        cd "$RUNNER_TEMP"
        python - << 'PYEOF'
        import os

        from neuracore.data_daemon.rust_selection import rust_daemon_binary_path

        # Fail fast if the daemon bundle didn't install -- otherwise the SDK
        # silently falls back to the Python daemon.
        binary = rust_daemon_binary_path()
        assert binary is not None, (
            "bundled Rust data-daemon binary not found; the neuracore "
            "install did not bundle it"
        )
        assert os.access(binary, os.X_OK), f"daemon binary not executable: {binary}"
        print(f"Bundled data-daemon binary: {binary}")
        PYEOF

    - name: Resolve test harness
      run: |
        echo "TEST_HARNESS_PATH=tests/integration/ml/test_algorithm_performance.py" >> "$GITHUB_ENV"
        echo "Test harness environment: staging"
        echo "Test harness ref: ${{ matrix.test-harness-ref }}"
        echo "Test harness commit: $(git rev-parse HEAD)"
        echo "Test harness path: tests/integration/ml/test_algorithm_performance.py"
        python - << 'EOF'
        import neuracore

        print(f"Installed neuracore version: {neuracore.__version__}")
        EOF

    - name: Start training job
      id: start-training
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NCD_RUST_DAEMON: "1"
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
        ALGORITHM_NAME: ${{ matrix.algorithm }}
      run: pytest -o log_cli=true --log-cli-level=INFO -v -k test_start_training "$TEST_HARNESS_PATH"

    - name: Write training metadata to files
      run: |
        echo "${{ steps.start-training.outputs.training_job_id }}" > training_job_id.txt
        echo "${{ matrix.test-harness-ref }}" > test_harness_ref.txt

    - name: Cache training metadata
      uses: actions/cache/save@v4
      with:
        path: |
          training_job_id.txt
          test_harness_ref.txt
        key: training-job-${{ matrix.algorithm }}-${{ matrix.environment }}-${{ github.run_number }}

    - name: Show disk space after tests
      if: always()
      run: df -h /
