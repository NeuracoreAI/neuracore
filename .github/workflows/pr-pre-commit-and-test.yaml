name: PR Pre-commit and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-22.04
    outputs:
      ml: ${{ steps.filter.outputs.ml }}
      non-ml: ${{ steps.filter.outputs.non-ml }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            ml:
              - 'neuracore/ml/**'
              - 'tests/unit/ml/**'
              - 'tests/unit/conftest.py'
              - 'neuracore/__init__.py'
            non-ml:
              - 'neuracore/**'
              - '!neuracore/ml/**'
              - 'tests/unit/**'
              - '!tests/unit/ml/**'
            deps:
              - 'setup.py'
            ci:
              - '.github/workflows/pr-pre-commit-and-test.yaml'
              - '.pre-commit-config.yaml'

  pre-commit:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: pre-commit/action@v3.0.1

  test-non-ml:
    needs: [detect-changes, pre-commit]
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]
    env:
      SHOULD_RUN: ${{ needs.detect-changes.outputs.non-ml == 'true' || needs.detect-changes.outputs.deps == 'true' || needs.detect-changes.outputs.ci == 'true' }}
    steps:
      - name: Checkout code
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: env.SHOULD_RUN == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: "setup.py"

      - name: Install Python dependencies
        if: env.SHOULD_RUN == 'true'
        run: pip install ".[dev,ml,import]" --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run non-ML unit tests
        if: env.SHOULD_RUN == 'true'
        run: pytest tests/unit --ignore=tests/unit/ml

  test-ml:
    needs: [detect-changes, pre-commit]
    runs-on: ubuntu-22.04
    env:
      UV_VENV_SEED: "true"
      SHOULD_RUN: ${{ needs.detect-changes.outputs.ml == 'true' || needs.detect-changes.outputs.deps == 'true' || needs.detect-changes.outputs.ci == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout code
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v6

      - name: Set up uv
        if: env.SHOULD_RUN == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "setup.py"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        if: env.SHOULD_RUN == 'true'
        run: uv pip install ".[dev,ml,import]" --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match

      - name: Run ML unit tests (except PI0)
        if: env.SHOULD_RUN == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run pytest tests/unit/ml --ignore=tests/unit/ml/algorithms/test_pi0.py

      - name: Run PI0 unit tests in isolated pytest process
        if: env.SHOULD_RUN == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run pytest tests/unit/ml/algorithms/test_pi0.py
