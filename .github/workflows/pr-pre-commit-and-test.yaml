name: PR Pre-commit and Test

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      ml: ${{ steps.filter.outputs.ml }}
      non-ml: ${{ steps.filter.outputs.non-ml }}
      deps: ${{ steps.filter.outputs.deps }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            ml:
              - 'neuracore/ml/**'
              - 'neuracore/core/**'
              - 'tests/unit/ml/**'
              - 'tests/unit/conftest.py'
              - 'neuracore/__init__.py'
            non-ml:
              - 'neuracore/**'
              - '!neuracore/ml/**'
              - 'tests/unit/**'
              - '!tests/unit/ml/**'
            deps:
              - 'pyproject.toml'
              - 'rust/**'
            ci:
              - '.github/workflows/pr-pre-commit-and-test.yaml'
              - '.pre-commit-config.yaml'

  pre-commit:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: pre-commit/action@v3.0.1

  test-non-ml:
    needs: [detect-changes, pre-commit]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-26]
        python-version: ["3.10", "3.11", "3.14"]
        package-manager: [uv, pip]
    env:
      UV_VENV_SEED: "true"
      SHOULD_RUN: ${{ needs.detect-changes.outputs.non-ml == 'true' || needs.detect-changes.outputs.deps == 'true' || needs.detect-changes.outputs.ci == 'true' }}
      # Coverage runs on the 3.10 leg: it's the only Linux leg that installs
      # [import] (no cp314 wheels for tensorflow-cpu), so importer tests count.
      SHOULD_RUN_COVERAGE: ${{ matrix.os == 'ubuntu-24.04' && matrix.python-version == '3.10' && matrix.package-manager == 'uv' }}
    steps:
      - name: Checkout code
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        if: env.SHOULD_RUN == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        if: env.SHOULD_RUN == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        if: env.SHOULD_RUN == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # Use brew's libclang — bindgen doesn't reliably find Xcode's. Matches
      # build-wheels.yaml.
      - name: Set up libclang (macOS)
        if: env.SHOULD_RUN == 'true' && runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Set up uv
        if: env.SHOULD_RUN == 'true' && matrix.package-manager == 'uv'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        if: env.SHOULD_RUN == 'true'
        run: |
          # [import] needs tensorflow-cpu (cp313 max, no cp314 wheels) and
          # pinocchio (manylinux-only): Linux + Python < 3.14 legs only.
          if [ "${{ matrix.os }}" = "macos-26" ] || [ "${{ matrix.python-version }}" = "3.14" ]; then
            EXTRAS=".[dev]"
          else
            EXTRAS=".[dev,import]"
          fi
          if [ "${{ matrix.package-manager }}" = "uv" ]; then
            uv pip install "${EXTRAS}" --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match
          else
            pip install "${EXTRAS}" --extra-index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Run non-ML unit tests
        if: env.SHOULD_RUN == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.package-manager }}" = "uv" ]; then
            # --no-project: deps came from `uv pip install`; re-syncing would
            # drop the dev/import extras.
            PYTEST="uv run --no-project pytest"
          else
            PYTEST="pytest"
          fi
          # Importer tests need the [import] extra, skipped on macOS
          # (pinocchio is manylinux-only) and 3.14 (no tensorflow-cpu wheels).
          IGNORE="--ignore=tests/unit/ml"
          if [ "${{ matrix.os }}" = "macos-26" ] || [ "${{ matrix.python-version }}" = "3.14" ]; then
            IGNORE="${IGNORE} --ignore=tests/unit/importer"
          fi
          PYTEST_ARGS="-sv -o log_cli=true --log-cli-level=INFO"
          if [ "${SHOULD_RUN_COVERAGE}" = "true" ]; then
            ${PYTEST} tests/unit \
              ${IGNORE} \
              ${PYTEST_ARGS} \
              --cov=neuracore \
              --junitxml=pytest.xml \
              --cov-report=term-missing:skip-covered \
              --cov-report=xml \
              | tee pytest-coverage.txt
          else
            ${PYTEST} tests/unit ${IGNORE} ${PYTEST_ARGS}
          fi

      - name: Generate diff coverage
        if: env.SHOULD_RUN == 'true' && env.SHOULD_RUN_COVERAGE == 'true'
        run: |
          diff-cover coverage.xml \
            --compare-branch=origin/main \
            --exclude neuracore/ml/** \
            --json-report diff-cover.json \
            || true

      - name: Upload coverage artifacts
        if: env.SHOULD_RUN == 'true' && env.SHOULD_RUN_COVERAGE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            pytest-coverage.txt
            pytest.xml
            diff-cover.json

  test-non-ml-complete:
    needs: [test-non-ml]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check all matrix jobs passed
        run: |
          if [ "${{ needs.test-non-ml.result }}" != "success" ]; then
            exit 1
          fi

  test-ml:
    needs: [detect-changes, pre-commit]
    runs-on: ubuntu-24.04
    env:
      UV_VENV_SEED: "true"
      SHOULD_RUN: ${{ needs.detect-changes.outputs.ml == 'true' || needs.detect-changes.outputs.deps == 'true' || needs.detect-changes.outputs.ci == 'true' }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.14"]
    steps:
      - name: Checkout code
        if: env.SHOULD_RUN == 'true'
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        if: env.SHOULD_RUN == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        if: env.SHOULD_RUN == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Set up uv
        if: env.SHOULD_RUN == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        if: env.SHOULD_RUN == 'true'
        run: uv pip install ".[dev,ml]" --extra-index-url https://download.pytorch.org/whl/cpu --index-strategy unsafe-best-match

      - name: Run ML unit tests
        if: env.SHOULD_RUN == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run --no-project pytest tests/unit/ml -m "not slow" -sv -o log_cli=true --log-cli-level=INFO
