name: Integration PF - Importer (Production)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the latest release tag."
        required: false
        type: string
        default: ""

env:
  IMPORTER_DATASETS_REPO: NeuracoreAI/integration_test_data
  IMPORTER_DATASETS_REF: main
  IMPORTER_DATASETS_PATH: integration_test_data
  IMPORTER_DATASETS_CACHE_SUBDIR: importer

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
        suite: [lerobot, mcap, rlds]

    steps:
      - name: Show disk space
        run: df -h /

      # Ref resolution (explicit input override, else the latest v* release
      # tag, verified after checkout) + checkout + harness summary.
      - name: Checkout test harness
        id: harness
        uses: NeuracoreAI/shared-workflows/actions/checkout-test-harness@main
        with:
          environment: production
          ref: ${{ inputs.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify importer datasets token
        run: |
          if [ -z "${{ secrets.INTEGRATION_TEST_DATA_GITHUB_TOKEN }}" ]; then
            echo "::error::INTEGRATION_TEST_DATA_GITHUB_TOKEN is not set. Add a PAT with read access to ${IMPORTER_DATASETS_REPO} as a neuracore repository secret."
            exit 1
          fi

      - name: Checkout importer integration test datasets
        uses: actions/checkout@v4
        with:
          repository: ${{ env.IMPORTER_DATASETS_REPO }}
          ref: ${{ env.IMPORTER_DATASETS_REF }}
          path: ${{ env.IMPORTER_DATASETS_PATH }}
          lfs: true
          token: ${{ secrets.INTEGRATION_TEST_DATA_GITHUB_TOKEN }}

      - name: Resolve importer dataset cache root
        run: |
          set -euo pipefail
          repo_root="${GITHUB_WORKSPACE}/${IMPORTER_DATASETS_PATH}"
          cache_root="${repo_root}/${IMPORTER_DATASETS_CACHE_SUBDIR}"
          for dataset_dir in rlds lerobot mcap; do
            if [ ! -e "${cache_root}/${dataset_dir}" ]; then
              echo "::error::Missing ${dataset_dir}/ under ${cache_root}"
              ls -la "${repo_root}" || true
              ls -la "${cache_root}" || true
              exit 1
            fi
          done
          echo "IMPORTER_RLDS_CACHE_DIR=${cache_root}" >> "$GITHUB_ENV"
          echo "IMPORTER_LEROBOT_CACHE_DIR=${cache_root}" >> "$GITHUB_ENV"
          echo "IMPORTER_MCAP_CACHE_DIR=${cache_root}" >> "$GITHUB_ENV"
          echo "Importer dataset cache root: ${cache_root}"
          echo "Importer datasets ref: ${IMPORTER_DATASETS_REF}"
          echo "Importer datasets commit: $(git -C "${repo_root}" rev-parse HEAD)"

      - name: Set up neuracore from PyPI
        uses: NeuracoreAI/shared-workflows/actions/setup-neuracore-from-pypi@main
        with:
          version: ${{ steps.harness.outputs.release-tag }}
          extras: dev,import
          pytorch-cpu: "true"

      - name: Run Importer Integration Tests
        env:
          NEURACORE_API_URL: https://api.neuracore.com/api
          NEURACORE_API_KEY: ${{ secrets.PROD_SERVICE_API_KEY }}
          NEURACORE_ORG_ID: ${{ vars.PROD_SERVICE_ORG_ID }}
          NEURACORE_ENDPOINT_TIMEOUT: 30
        run: |
          set -euo pipefail
          pytest_args=(
            -o log_cli=true
            --log-cli-level=INFO
            --log-cli-format="%(asctime)s %(levelname)-8s [%(name)s] %(message)s"
            --log-cli-date-format="%H:%M:%S"
            -v
            -k "not shared"
          )
          pytest "${pytest_args[@]}" "tests/integration/importer/test_${{ matrix.suite }}_dataset_import.py"

      - name: Show disk space after tests
        if: always()
        run: df -h /
