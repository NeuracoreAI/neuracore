name: Cougar Tracing - Data Daemon (Staging)
run-name: "Cougar Tracing run — data daemon (${{ github.ref_name }})"

# TEMPORARY tracing branch (ci/cougar-tracing-run). The NORMAL nightly
# data-daemon integration suite (full test scope, full matrix, single pass)
# plus the diagnostic capture layer: RUST_LOG=trace daemon logs, continuous
# log streams + state.db snapshots, everything uploaded as artifacts, and
# job/faulthandler timeouts so a wedge is diagnosable. Do not merge to main.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the current branch."
        required: false
        type: string
        default: ""

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      NCD_RUST_DAEMON: "1"
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ['3.10', '3.14']
        os: [ubuntu-24.04, macos-26]

    steps:
    - name: Show disk space
      run: df -h /

    - name: Checkout test harness
      uses: NeuracoreAI/shared-workflows/actions/checkout-test-harness@main
      with:
        environment: staging
        ref: ${{ inputs.ref }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set up neuracore with Rust data daemon
      uses: NeuracoreAI/shared-workflows/actions/setup-neuracore-from-source@main
      with:
        checkout: "false"
        path: "."
        extras: dev

    - name: Start state snapshotter
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p tracing-artifacts/snapshots
        cat > "${RUNNER_TEMP}/snapshotter.sh" <<'SNAP'
        #!/usr/bin/env bash
        # Continuous capture so daemon evidence is never lost:
        #  - logstreams/: one `tail -F` per discovered daemon.log — survives
        #    truncation and per-test daemon restarts, so the full log history
        #    always exists even though the harness reuses/wipes the file.
        #  - dblatest/ + dbarchive/: every state.db is backed up each tick;
        #    when a db path disappears (harness cleanup) its last copy is
        #    moved to dbarchive/ permanently.
        #  - snapshots/: 10s point-in-time ring (last 40) for state evolution.
        set -u
        roots=(".data_daemon_test_state" "${HOME}/.neuracore/data_daemon")
        base="tracing-artifacts"
        mkdir -p "${base}/logstreams" "${base}/dblatest" "${base}/dbarchive" \
          "${base}/snapshots" "${base}/.watch"
        while true; do
          ts="$(date +%Y%m%d_%H%M%S)"
          out="${base}/snapshots/${ts}"
          mkdir -p "${out}"
          for root in "${roots[@]}"; do
            [ -d "${root}" ] || continue
            while IFS= read -r lg; do
              key="cap_$(echo "${lg}" | tr '/ ' '__')"
              if [ ! -e "${base}/.watch/log_${key}" ]; then
                printf '%s\n' "${lg}" > "${base}/.watch/log_${key}"
                nohup tail -n +1 -F "${lg}" \
                  >> "${base}/logstreams/${key}" 2>/dev/null &
              fi
              cp "${lg}" "${out}/${key}" 2>/dev/null || true
            done < <(find "${root}" -name 'daemon.log' 2>/dev/null)
            while IFS= read -r db; do
              key="cap_$(echo "${db}" | tr '/ ' '__')"
              printf '%s\n' "${db}" > "${base}/.watch/db_${key}"
              sqlite3 "${db}" ".backup '${base}/dblatest/${key}'" 2>/dev/null \
                || cp "${db}" "${base}/dblatest/${key}" 2>/dev/null || true
              cp "${base}/dblatest/${key}" "${out}/${key}" 2>/dev/null || true
            done < <(find "${root}" -name 'state.db' 2>/dev/null)
          done
          for marker in "${base}"/.watch/db_cap_*; do
            [ -e "${marker}" ] || continue
            src="$(cat "${marker}")"
            key="$(basename "${marker}")"; key="${key#db_}"
            if [ ! -e "${src}" ] && [ -e "${base}/dblatest/${key}" ]; then
              mv "${base}/dblatest/${key}" "${base}/dbarchive/${key}.${ts}" \
                2>/dev/null || true
              rm -f "${marker}"
            fi
          done
          { df -h /; echo; ps aux | grep -Ei 'data-daemon|neuracore|pytest|ffmpeg' | grep -v grep; } \
            > "${out}/system.txt" 2>/dev/null || true
          ls -1dt "${base}"/snapshots/*/ 2>/dev/null | tail -n +41 \
            | while IFS= read -r old; do rm -rf "${old}"; done
          sleep 10
        done
        SNAP
        chmod +x "${RUNNER_TEMP}/snapshotter.sh"
        nohup "${RUNNER_TEMP}/snapshotter.sh" > tracing-artifacts/snapshotter.log 2>&1 &
        echo "$!" > "${RUNNER_TEMP}/snapshotter.pid"
        echo "snapshotter pid $(cat "${RUNNER_TEMP}/snapshotter.pid")"

    - name: Run Data Daemon Integration Tests (full suite, trace capture)
      # Bounded well under the 6h default so a wedge cannot burn the budget
      # and the artifact upload still runs; faulthandler dumps stacks first.
      timeout-minutes: 330
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
        NEURACORE_PROVIDE_LIVE_DATA: false
        RUST_LOG: "data_daemon=trace,data_daemon_bridge=trace,data_daemon_shared=trace,data_daemon_ipc=trace,info"
        NDD_DEBUG: "1"
        PYTHONFAULTHANDLER: "1"
      # --import-mode=importlib keeps the repo root off sys.path. log_cli_format
      # namespaces live log lines by worker process so interleaved context
      # output stays attributable.
      shell: bash
      run: |
        set -uo pipefail
        mkdir -p tracing-artifacts
        pytest -o log_cli=true --log-cli-level=INFO \
          -o "log_cli_format=%(levelname)-8s %(processName)-11s %(filename)s:%(lineno)s %(message)s" \
          -o faulthandler_timeout=900 \
          --import-mode=importlib \
          tests/integration/platform/data_daemon/ \
          2>&1 | tee "tracing-artifacts/pytest-daemon.log"
        exit "${PIPESTATUS[0]}"

    - name: Collect final daemon state
      if: always()
      shell: bash
      run: |
        set -uo pipefail
        mkdir -p tracing-artifacts/final
        for root in ".data_daemon_test_state" "${HOME}/.neuracore/data_daemon"; do
          [ -d "${root}" ] || continue
          find "${root}" \( -name 'daemon.log' -o -name 'state.db' -o -name 'state.db-*' \) \
            -exec sh -c 'cp "$2" "$1/cap_$(echo "$2" | tr "/ " "__")" 2>/dev/null || true' _ "tracing-artifacts/final" {} \; || true
          du -ak "${root}" 2>/dev/null | sort -rn > "tracing-artifacts/final/manifest_$(echo "${root}" | tr '/ ' '__').txt" || true
        done

    - name: Stop capture and compress log streams
      if: always()
      # The snapshotter and tail followers must be dead before upload-artifact
      # zips the directory — files mutating mid-zip make the upload fail with
      # "error creating zip".
      run: |
        kill "$(cat "${RUNNER_TEMP}/snapshotter.pid" 2>/dev/null)" 2>/dev/null || true
        pkill -f 'tail.*daemon.log' 2>/dev/null || true
        sleep 2
        gzip -f tracing-artifacts/logstreams/* 2>/dev/null || true

    - name: Upload tracing artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cougar-tracing-daemon-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          tracing-artifacts/
        if-no-files-found: warn
        include-hidden-files: true
        retention-days: 7

    - name: Upload recordings tree (best-effort, may be large)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: cougar-tracing-daemon-recordings-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .data_daemon_test_state/**/recordings/**
        if-no-files-found: warn
        include-hidden-files: true
        retention-days: 7

    - name: Show disk space after tests
      if: always()
      run: df -h /
