name: Integration PF - Data Daemon (Staging)

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the current branch."
        required: false
        type: string
        default: ""

      runner_os:
        description: "Runner for this targeted run"
        required: true
        type: choice
        options:
          - macos-26
          - ubuntu-24.04
        default: macos-26

      python_version:
        description: "Python version for this targeted run"
        required: true
        type: choice
        options:
          - "3.10"
          - "3.14"
        default: "3.14"

      pytest_target:
        description: "Pytest node to run"
        required: true
        type: string
        default: "tests/integration/platform/data_daemon/performance/test_pre_network.py::test_disk_db_write_performance[300s-6recs-2ctx-seq-10joints-15hz-1cam-1920x1080-15hz]"

jobs:
  pre-commit:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    runs-on: ${{ matrix.os }}

    env:
      NCD_RUST_DAEMON: "1"

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        python-version: ${{ fromJSON(github.event_name == 'schedule' && '["3.10","3.14"]' || format('["{0}"]', inputs.python_version)) }}
        os: ${{ fromJSON(github.event_name == 'schedule' && '["ubuntu-24.04","macos-26"]' || format('["{0}"]', inputs.runner_os)) }}

    steps:
      - name: Show disk space
        run: df -h /

      - name: Checkout test harness
        uses: NeuracoreAI/shared-workflows/actions/checkout-test-harness@main
        with:
          environment: staging
          ref: ${{ inputs.ref }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Set up neuracore with Rust data daemon
        uses: NeuracoreAI/shared-workflows/actions/setup-neuracore-from-source@main
        with:
          checkout: "false"
          path: "."
          extras: dev

      - name: Run Data Daemon Integration Tests
        env:
          NEURACORE_API_URL: https://staging.api.neuracore.com/api
          NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
          NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
          NEURACORE_PROVIDE_LIVE_DATA: false
          PYTEST_TARGET: ${{ github.event_name == 'schedule' && 'tests/integration/platform/data_daemon/' || inputs.pytest_target }}

        run: |
          pytest -o log_cli=true --log-cli-level=INFO \
            -o "log_cli_format=%(levelname)-8s %(processName)-11s %(filename)s:%(lineno)s %(message)s" \
            --import-mode=importlib \
            "$PYTEST_TARGET"

      - name: Show disk space after tests
        if: always()
        run: df -h /