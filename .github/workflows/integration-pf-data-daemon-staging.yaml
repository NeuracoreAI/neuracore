name: Integration PF - Data Daemon (Staging)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the current branch."
        required: false
        type: string
        default: ""

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    # Run the behavioural correctness suite against the newest supported
    # Python version on macOS.
    runs-on: ${{ matrix.os }}
    env:
      NCD_RUST_DAEMON: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.14']
        os: [macos-26]

    steps:
    - name: Show disk space
      run: df -h /


    - name: Checkout test harness
      uses: NeuracoreAI/shared-workflows/actions/checkout-test-harness@main
      with:
        environment: staging
        ref: ${{ inputs.ref }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Set up neuracore with Rust data daemon
      uses: NeuracoreAI/shared-workflows/actions/setup-neuracore-from-source@main
      with:
        checkout: "false"
        path: "."
        extras: dev

    - name: Run Data Daemon Behavioural Correctness Tests
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
        NEURACORE_PROVIDE_LIVE_DATA: false
        PYTHONFAULTHANDLER: "1"
        PYTHONUNBUFFERED: "1"
        RUST_BACKTRACE: full
        RUST_LOG: "warn,data_daemon::cli::launch=info,data_daemon::ipc::listener=info,data_daemon::pipeline::dispatcher=info,data_daemon::cloud::watchers::recording_reaper=info,data_daemon::state::store=info"

      # --import-mode=importlib keeps the repo root off sys.path. log_cli_format
      # namespaces live log lines by worker process so interleaved context output
      # stays attributable.
      run: >-
        pytest -s -vv --tb=long
        --log-cli-level=INFO
        --log-cli-format="%(levelname)-8s %(processName)-11s %(filename)s:%(lineno)s %(message)s"
        --import-mode=importlib
        tests/integration/platform/data_daemon/behavioural_correctness/

    - name: Show Rust daemon diagnostics
      if: always()
      shell: bash
      run: |
        echo "===== .data_daemon_test_state/daemon.log ====="
        if [[ -f .data_daemon_test_state/daemon.log ]]; then
          tail -n 500 .data_daemon_test_state/daemon.log
        else
          echo "No daemon log was created."
        fi
        echo "===== remaining daemon processes ====="
        ps -ef | grep -E '[n]c-data-daemon|[d]ata-daemon' || true

    - name: Upload Rust daemon diagnostics
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: rust-daemon-${{ matrix.os }}-py${{ matrix.python-version }}
        path: |
          .data_daemon_test_state/daemon.log
          .data_daemon_test_state/state.db
          .data_daemon_test_state/state.db-wal
          .data_daemon_test_state/state.db-shm
          .data_daemon_test_state/artifacts/
        if-no-files-found: warn

    - name: Show disk space after tests
      if: always()
      run: df -h /
