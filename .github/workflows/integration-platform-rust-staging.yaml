name: Integration PF (Staging, Rust Daemon)

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the current branch."
        required: false
        type: string
        default: ""

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    runs-on: ubuntu-24.04
    env:
      NCD_RUST_DAEMON: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        python-version: ['3.11']
        ffmpeg: [true, false]

    steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Checkout repository metadata
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve test harness ref
      id: harness-ref
      env:
        INPUT_REF: ${{ inputs.ref }}
        BRANCH_REF: ${{ github.ref_name }}
      run: |
        if [ -n "$INPUT_REF" ]; then
          harness_ref="$INPUT_REF"
        else
          harness_ref="$BRANCH_REF"
        fi
        echo "harness_ref=$harness_ref" >> "$GITHUB_OUTPUT"
        echo "Resolved test harness ref: $harness_ref"

    - name: Checkout test harness
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.harness-ref.outputs.harness_ref }}
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      id: setup-python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust

    - name: Install FFmpeg
      if: matrix.ffmpeg == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Build Rust daemon artefacts
      env:
        PYO3_PYTHON: ${{ steps.setup-python.outputs.python-path }}
      run: ./rust/scripts/build_wheel_artefacts.sh

    - name: Install Python dependencies
      run: |
        python -m pip install --no-cache-dir --upgrade pip
        pip install --no-cache-dir ".[dev,ml,examples]"

    - name: Resolve test harness
      run: |
        echo "Test harness environment: staging"
        echo "Test harness ref: ${{ steps.harness-ref.outputs.harness_ref }}"
        echo "Test harness commit: $(git rev-parse HEAD)"
        echo "Test harness paths:"
        echo "  tests/integration/platform/test_runtime_data_flow.py"
        echo "  tests/integration/platform/test_consume_stream.py"
        python - << 'EOF'
        import neuracore

        print(f"Installed neuracore version: {neuracore.__version__}")
        EOF

    - name: Smoke-check Rust daemon selection
      run: |
        python - << 'EOF'
        from neuracore.data_daemon.rust_selection import (
            rust_daemon_binary_path,
            rust_daemon_enabled,
        )

        assert rust_daemon_enabled(), "Expected NCD_RUST_DAEMON to enable Rust daemon"
        binary_path = rust_daemon_binary_path()
        assert binary_path is not None and binary_path.is_file(), binary_path

        import neuracore.data_daemon._native_producer as native_producer

        print("Rust daemon enabled:", rust_daemon_enabled())
        print("Bundled binary:", binary_path)
        print("Native producer:", native_producer)
        EOF

    - name: Run Consume Stream Integration Test
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
      continue-on-error: true
      run: |
        if ! pytest -o log_cli=true --log-cli-level=INFO tests/integration/platform/test_consume_stream.py; then
          echo "::warning::test_consume_stream.py failed, but this is non-blocking."
        fi

    - name: Run Data Daemon Integration Tests
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
      run: pytest -o log_cli=true --log-cli-level=INFO tests/integration/platform/data_daemon/
