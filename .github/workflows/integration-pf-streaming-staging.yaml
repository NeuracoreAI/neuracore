name: Integration PF - Consume Stream (Staging)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the current branch."
        required: false
        type: string
        default: ""

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    runs-on: ${{ matrix.os }}
    env:
      NCD_RUST_DAEMON: "1"
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        python-version: ['3.10', '3.14']
        os: [ubuntu-24.04, macos-26]

    steps:
    - name: Show disk space
      run: df -h /

    # Ref resolution (explicit input override, else the caller's branch) +
    # checkout + harness summary.
    - name: Checkout test harness
      uses: NeuracoreAI/shared-workflows/actions/checkout-test-harness@main
      with:
        environment: staging
        ref: ${{ inputs.ref }}

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    # Rust toolchain + cargo cache + FFmpeg + daemon binary build +
    # `pip install .` (maturin bundles the binary) + bundle verification.
    - name: Set up neuracore with Rust data daemon
      uses: NeuracoreAI/shared-workflows/actions/setup-neuracore-from-source@main
      with:
        checkout: "false"
        path: "."
        extras: dev

    - name: Run Consume Stream Integration Test
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
      run: |
        if ! pytest -o log_cli=true --log-cli-level=INFO --import-mode=importlib tests/integration/platform/test_consume_stream.py; then
          echo "::warning::test_consume_stream.py failed, but this is non-blocking."
        fi

    - name: Show disk space after tests
      if: always()
      run: df -h /
