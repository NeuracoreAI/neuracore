name: Integration ML - Back To Back Training (Staging)

on:
  schedule:
    - cron: "0 5 * * *"  # 5. test_back_to_back_training.py
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04
    # TODO: NDD has socket issue when running in parallel
    #   in CommunicationsManager when calling create_producer_socket()

    steps:
      - name: Show disk space
        run: df -h /

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libxml2-utils xvfb libgl1-mesa-dev libgl1 libosmesa6-dev

      - name: Checkout test harness
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Pull LFS objects
        run: git lfs pull

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      # Build the standalone daemon binary before `pip install .` so the
      # [tool.maturin] include bundles it into the built wheel; without it the
      # SDK silently falls back to the Python daemon.
      - name: Build Rust data-daemon binary
        run: bash rust/scripts/build_wheel_artefacts.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          pip install --no-cache-dir ".[dev,ml,examples]"

      # cd away from the repo root so `import neuracore` resolves to the
      # installed wheel, not the source tree the binary was staged into.
      - name: Verify bundled Rust daemon
        run: |
          cd "$RUNNER_TEMP"
          python - << 'PYEOF'
          import os

          from neuracore.data_daemon.rust_selection import rust_daemon_binary_path

          # Fail fast if the daemon bundle didn't install -- otherwise the SDK
          # silently falls back to the Python daemon.
          binary = rust_daemon_binary_path()
          assert binary is not None, (
              "bundled Rust data-daemon binary not found; the neuracore "
              "install did not bundle it"
          )
          assert os.access(binary, os.X_OK), f"daemon binary not executable: {binary}"
          print(f"Bundled data-daemon binary: {binary}")
          PYEOF

      - name: Resolve test harness
        run: |
          echo "Test harness environment: staging"
          echo "Test harness ref: ${{ github.ref_name }}"
          echo "Test harness commit: $(git rev-parse HEAD)"
          echo "Test harness path: tests/integration/ml/test_back_to_back_training.py"
          python - << 'EOF'
          import neuracore

          print(f"Installed neuracore version: {neuracore.__version__}")
          EOF

      - name: Run Integration Test
        env:
          NEURACORE_API_URL: https://staging.api.neuracore.com/api
          NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
          NCD_RUST_DAEMON: "1"
          NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
          NEURACORE_ENDPOINT_TIMEOUT: 30
          DISPLAY: :0
        run: |
          Xvfb $DISPLAY -screen 0 1280x1024x24 &
          pytest \
            -o log_cli=true \
            --log-cli-level=INFO \
            --log-cli-format="%(asctime)s %(levelname)-8s [%(name)s] %(message)s" \
            --log-cli-date-format="%H:%M:%S" \
            -v \
            tests/integration/ml/test_back_to_back_training.py

      - name: Show disk space after tests
        if: always()
        run: df -h /
