name: Integration PF (Staging)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit SHA, tag, or branch to test. Leave empty to use the current branch."
        required: false
        type: string
        default: ""

jobs:
  pre-commit:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.ref }}
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - uses: pre-commit/action@v3.0.1

  test:
    needs: pre-commit
    # Exercise the bundled Rust data daemon on each OS we ship a wheel for, in
    # parallel: Linux (x86_64) and macOS (Apple Silicon, the primary long-term
    # mac target). Each leg builds the daemon binary + extension natively on its
    # own runner and runs the integration suite against that OS's real bundle,
    # not a foreign one. Mirrors the per-OS legs of build-wheels.yaml.
    runs-on: ${{ matrix.runner }}
    env:
      # Per-leg daemon-wheel target + macOS deployment floor, kept in lockstep
      # with build-wheels.yaml. MACOSX_DEPLOYMENT_TARGET is empty (harmless) on
      # the Linux leg.
      DAEMON_TARGET: ${{ matrix.target }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-deployment-target }}
      # Route the SDK through the bundled Rust data daemon (the whole point of
      # exercising the bundle end-to-end). Absent this, the SDK falls back to the
      # legacy Python daemon and the wheel under test is never touched.
      NCD_RUST_DAEMON: "1"
    strategy:
      fail-fast: false
      # Run both OS legs at once; the suite itself is serial within a leg.
      max-parallel: 2
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            python-version: '3.11'
          - runner: macos-15
            target: aarch64-apple-darwin
            macos-deployment-target: '11.0'
            python-version: '3.11'

    steps:
    # Linux runners ship near-full; the native cargo build + ffmpeg need room.
    # No-op on macOS (action is Ubuntu-only), so gate it to the Linux leg.
    - name: Free Disk Space (Ubuntu)
      if: runner.os == 'Linux'
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: Checkout repository metadata
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Resolve test harness ref
      id: harness-ref
      env:
        INPUT_REF: ${{ inputs.ref }}
        BRANCH_REF: ${{ github.ref_name }}
      run: |
        if [ -n "$INPUT_REF" ]; then
          harness_ref="$INPUT_REF"
        else
          harness_ref="$BRANCH_REF"
        fi
        echo "harness_ref=$harness_ref" >> "$GITHUB_OUTPUT"
        echo "Resolved test harness ref: $harness_ref"

    - name: Checkout test harness
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.harness-ref.outputs.harness_ref }}
        fetch-depth: 0

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ env.DAEMON_TARGET }}

    - name: Cache cargo build
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: rust

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    # ffmpeg for the suite (both OSes). The daemon binary is built differently
    # per OS: Linux builds it INSIDE the manylinux container (below) so its glibc
    # matches the wheel; macOS has no container, so it builds + ad-hoc-signs the
    # binary natively here and exports LIBCLANG_PATH (iceoryx2's bindgen) through
    # $GITHUB_ENV for the maturin extension build that follows.
    - name: Install FFmpeg (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install deps and build daemon binary (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install ffmpeg llvm
        echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"
        bash "$GITHUB_WORKSPACE/rust/scripts/build_wheel_artefacts.sh" --target "$DAEMON_TARGET"

    - name: Build daemon wheel
      uses: PyO3/maturin-action@v1
      with:
        working-directory: packaging/neuracore-data-daemon
        target: ${{ env.DAEMON_TARGET }}
        # manylinux_2_28 (AlmaLinux 8) on Linux, NOT auto: iceoryx2's bindgen
        # needs libclang >= 5.0 but manylinux2014's clang is 3.4. Ignored on
        # macOS (no container) where the build is native. See build-wheels.yaml.
        manylinux: ${{ runner.os == 'Linux' && '2_28' || 'auto' }}
        # Linux only: build the daemon binary inside the manylinux container so
        # its glibc matches the wheel, and install clang/libclang for bindgen.
        # Never runs off Linux — macOS does the equivalent in the native step
        # above. $GITHUB_WORKSPACE anchors the script path.
        before-script-linux: |
          (command -v yum && yum install -y clang) || (command -v dnf && dnf install -y clang) || true
          bash "$GITHUB_WORKSPACE/rust/scripts/build_wheel_artefacts.sh" --target x86_64-unknown-linux-gnu
        args: >-
          --release
          --out dist
          --interpreter python${{ matrix.python-version }}

    - name: Install Python dependencies
      run: |
        python -m pip install --no-cache-dir --upgrade pip
        # Install the locally-built daemon wheel first so the
        # `neuracore-data-daemon==…` pin is already satisfied and the next
        # install does not pull the released wheel from PyPI.
        pip install --no-cache-dir packaging/neuracore-data-daemon/dist/*.whl
        pip install --no-cache-dir ".[dev,ml,examples]"

    - name: Resolve test harness
      run: |
        echo "Test harness environment: staging"
        echo "Test harness ref: ${{ steps.harness-ref.outputs.harness_ref }}"
        echo "Test harness commit: $(git rev-parse HEAD)"
        echo "Test harness paths:"
        echo "  tests/integration/platform/test_runtime_data_flow.py"
        echo "  tests/integration/platform/test_consume_stream.py"
        python - << 'EOF'
        import os

        import neuracore
        from neuracore.data_daemon.rust_selection import (
            is_rust_daemon_enabled,
            rust_daemon_binary_path,
        )

        print(f"Installed neuracore version: {neuracore.__version__}")
        print(f"NCD_RUST_DAEMON enabled: {is_rust_daemon_enabled()}")

        # Fail fast if the daemon bundle for this OS did not install — otherwise
        # the SDK would silently fall back to the Python daemon and the run would
        # no longer be testing the bundle this leg exists to validate.
        binary = rust_daemon_binary_path()
        assert binary is not None, (
            "bundled Rust data-daemon binary not found; the "
            "neuracore-data-daemon wheel did not install"
        )
        assert os.access(binary, os.X_OK), f"daemon binary not executable: {binary}"
        print(f"Bundled data-daemon binary: {binary}")
        EOF

    - name: Run Data Daemon Integration Tests
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
        # Exercise the bundled Rust data-daemon binary (installed via the daemon
        # wheel above) rather than the in-process Python runner.
        NCD_RUST_DAEMON: "1"
      run: pytest -o log_cli=true --log-cli-level=INFO --import-mode=importlib tests/integration/platform/data_daemon/

    - name: Run Consume Stream Integration Test
      env:
        NEURACORE_API_URL: https://staging.api.neuracore.com/api
        NEURACORE_API_KEY: ${{ secrets.STAGING_SERVICE_API_KEY }}
        NEURACORE_ORG_ID: ${{ vars.STAGING_SERVICE_ORG_ID }}
        # Exercise the bundled Rust data-daemon binary, matching the rest of the
        # suite in this leg.
      continue-on-error: true
      run: |
        if ! pytest -o log_cli=true --log-cli-level=INFO --import-mode=importlib tests/integration/platform/test_consume_stream.py; then
          echo "::warning::test_consume_stream.py failed, but this is non-blocking."
        fi
