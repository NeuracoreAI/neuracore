[project]
name = "neuracore"
version = "7.9.1"
description = "Neuracore Client Library"
readme = "README.md"
license = "MIT"
authors = [{ name = "Stephen James", email = "stephen@neuraco.com" }]
requires-python = ">=3.10"
keywords = ["robotics", "machine-learning", "ai", "client-library"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
]
dependencies = [
    "numpy>=2.0.0",
    "requests>=2.31.0",
    "pillow>=10.0.0",
    "pyyaml>=6.0.1",
    "tqdm>=4.66.0",
    "requests-oauthlib",
    "pydantic>=2.10",
    "av==14.4.0",
    "aiortc",
    "aiohttp-sse-client",
    "numpy-stl",
    "wget",
    "uvicorn[standard]",
    "fastapi",
    "psutil",
    "typer>=0.20.0",
    "neuracore-types>=4.3.0,<5.0.0",
    "pip",  # For backwards compatibility 
]

[project.optional-dependencies]
examples = ["matplotlib>=3.3.0", "mujoco==2.3.7", "pyquaternion>=0.9.5"]
mjcf = ["mujoco>3"]
ml = [
    "torch",
    "torchvision",
    "transformers==4.57.3",
    "huggingface-hub==0.36.0",
    "diffusers==0.35.1",
    "safetensors==0.6.2",
    "einops",
    "hydra-core>=1.3.0",
    "tensorboard>=2",
]

[project.scripts]
neuracore = "neuracore.core.cli.app:main"
nc-login = "neuracore.core.cli.generate_api_key:main"
nc-select-org = "neuracore.core.cli.select_current_org:main"
nc-launch-server = "neuracore.core.cli.launch_server:main"

[project.urls]
Homepage = "https://github.com/neuracoreai/neuracore"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["neuracore"]

[dependency-groups]
dev = [
    "pytest>=6.2.5",
    "pytest-cov>=2.12.1",
    "pytest-asyncio>=0.15.1",
    "pytest-xdist",
    "requests-mock>=1.9.3",
    "pre-commit",
]

[tool.uv]
# examples and mjcf extras have conflicting mujoco versions - they are mutually exclusive
conflicts = [
    [
        { extra = "examples" },
        { extra = "mjcf" },
    ],
]
