[package]
name = "data-daemon"
version = "0.1.0"
edition = "2021"
description = "Neuracore data daemon — Rust rewrite (see docs/data-daemon-rewrite.md)."
license = "MIT"

[[bin]]
name = "data-daemon"
path = "src/main.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
dirs = "5"
nix = { version = "0.29", features = ["fs"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }

[dev-dependencies]
tempfile = "3"
