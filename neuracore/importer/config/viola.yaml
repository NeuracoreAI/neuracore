# VIOLA dataset sources:
# TFDS: https://www.tensorflow.org/datasets/catalog/viola
# LeRobot mirror: https://huggingface.co/datasets/lerobot/viola
#
# Note: TFDS import is currently wired through the RLDS importer in this repo.
input_dataset_name: viola
dataset_type: RLDS

output_dataset:
  name: viola_tfds
  tags: [franka, kitchen, viola, imitation, tfds]
  description: "VIOLA dataset in TFDS/RLDS format (Open X-Embodiment)."

robot:
  name: franka_panda_viola
  urdf_path: "neuracore/importer/robots/franka_panda.urdf"
  overwrite_existing: true

# TFDS metadata does not expose an explicit control frequency; 20Hz aligns with the
# corresponding LeRobot conversion metadata.
frequency: 20.0

data_import_config:
  RGB_IMAGES:
    source: observation
    format:
      image_convention: CHANNELS_LAST
      order_of_channels: RGB
    mapping:
      - name: agentview_rgb
        source_name: agentview_rgb
      - name: eye_in_hand_rgb
        source_name: eye_in_hand_rgb

  JOINT_POSITIONS:
    source: observation.joint_states
    format:
      angle_units: RADIANS
    mapping:
      - name: panda_joint1
        index: 0
      - name: panda_joint2
        index: 1
      - name: panda_joint3
        index: 2
      - name: panda_joint4
        index: 3
      - name: panda_joint5
        index: 4
      - name: panda_joint6
        index: 5
      - name: panda_joint7
        index: 6

  PARALLEL_GRIPPER_OPEN_AMOUNTS:
    source: observation.gripper_states
    format:
      normalize:
        min: 0.0
        max: 0.08
    mapping:
      - name: gripper
        index: 0

  VISUAL_JOINT_POSITIONS:
    source: observation.gripper_states
    format:
      visual_joint_type: GRIPPER
      normalize:
        min: 0.0
        max: 0.08
    mapping:
      - name: panda_finger_joint1
        index: 0
      - name: panda_finger_joint2
        index: 0

  PARALLEL_GRIPPER_TARGET_OPEN_AMOUNTS:
    source: action
    format:
      invert_gripper_amount: true
    mapping:
      - name: gripper_target_open
        source_name: gripper_closedness_action

  END_EFFECTOR_POSES:
    source: observation.ee_states
    format:
      pose_type: MATRIX
    mapping:
      - name: end_effector_pose
        index_range:
          start: 0
          end: 16

  LANGUAGE:
    source: observation.natural_language_instruction
    format:
      language_type: BYTES
    mapping:
      - name: instruction

  CUSTOM_1D:
    source: action
    mapping:
      - name: action_world_vector
        source_name: world_vector
      - name: action_rotation_delta
        source_name: rotation_delta
      - name: action_terminate_episode
        source_name: terminate_episode
