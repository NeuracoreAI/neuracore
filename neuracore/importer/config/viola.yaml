input_dataset_name: viola
dataset_type: RLDS

output_dataset:
  name: viola
  tags: [franka, kitchen, viola, imitation]
  description: "VIOLA dataset: Franka robot interacting with stylized kitchen tasks."

robot:
  name: franka_panda
  urdf_path: "neuracore/importer/robots/franka_panda_minimal.urdf"
  overwrite_existing: true

frequency: 10.0 # Update if a more accurate control frequency is known.

data_import_config:
  RGB_IMAGES:
    source: observation
    format:
      image_convention: CHANNELS_LAST
      order_of_channels: RGB
    mapping:
      - name: agentview_rgb
        source_name: agentview_rgb
      - name: eye_in_hand_rgb
        source_name: eye_in_hand_rgb

  JOINT_POSITIONS:
    source: observation.joint_states
    format:
      angle_units: RADIANS
    mapping:
      - name: panda_joint1
        index: 0
      - name: panda_joint2
        index: 1
      - name: panda_joint3
        index: 2
      - name: panda_joint4
        index: 3
      - name: panda_joint5
        index: 4
      - name: panda_joint6
        index: 5
      - name: panda_joint7
        index: 6

  PARALLEL_GRIPPER_OPEN_AMOUNTS:
    source: observation.gripper_states
    format:
      normalize:
        min: 0.0
        max: 0.08
    mapping:
      - name: gripper
        index: 0

  PARALLEL_GRIPPER_TARGET_OPEN_AMOUNTS:
    source: action
    mapping:
      - name: gripper_target
        source_name: gripper_closedness_action
        inverted: true
        offset: 1.0 # assumes closedness_action in [0,1] where 1=closed, 0=open

  END_EFFECTOR_POSES:
    source: observation.ee_states
    format:
      pose_type: MATRIX
    mapping:
      - name: end_effector_pose
        index_range:
          start: 0
          end: 16

  LANGUAGE:
    source: observation.natural_language_instruction
    format:
      language_type: BYTES
    mapping:
      - name: instruction

  CUSTOM_1D:
    source: action
    mapping:
      - name: action_world_vector
        source_name: world_vector
      - name: action_rotation_delta
        source_name: rotation_delta
      - name: action_terminate
        source_name: terminate_episode
