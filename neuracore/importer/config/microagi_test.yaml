input_dataset_name: microagi_test_run1
dataset_type: MCAP

output_dataset:
  name: microagi_v1_run4
  tags: [mcap]
  description: "MCAP import for microagi_test_run1 (combined cameras)."

robot:
  name: "Human Demonstrator"
  urdf_path: ""
  overwrite_existing: true

data_import_config:
  RGB_IMAGES:
    format:
      image_convention: CHANNELS_LAST
      order_of_channels: RGB
    mapping:
      - name: color_main
        source_name: /camera/color/image.data
      - name: color_cam1
        source_name: /camera/color/image_cam1.data
      - name: color_cam2
        source_name: /camera/color/image_cam2.data

  DEPTH_IMAGES:
    format:
      distance_units: MM
    mapping:
      - name: depth_main
        source_name: /camera/depth/image.data

