input_dataset_name: lerobot/nyu_franka_play_dataset
dataset_type: RLDS

output_dataset:
  name: NYU_franka_play_11032026_delta_target
  tags: [franka, kitchen, play, cooking, manipulation]
  description: "NYU_franka_play is a real-world robot manipulation dataset collected on a Franka Panda arm, consisting of diverse “play” (teleoperated exploratory) trajectories for learning general-purpose manipulation policies. It includes time-synced RGB observations with robot proprioception and action/control signals, suitable for imitation learning and offline RL."

robot:
  name: nyu_franka_09032026_2d
  mjcf_path: "panda.urdf"

frequency: 5

data_import_config: 
  RGB_IMAGES:
    source: observation
    format:
      image_convention: CHANNELS_LAST
    mapping: 
      - name: image
        source_name: image
      - name: additional
        source_name: image_additional_view
  
  DEPTH_IMAGES:
    source: observation
    format:
      distance_units: MM
    mapping: 
      - name: depth
        source_name: depth
      - name: depth_additional_view
        source_name: depth_additional_view
  
  JOINT_POSITIONS:
    source: observation.state
    format:
      angle_units: RADIANS
    mapping:
      - name: panda_joint1
        index: 0
      - name: panda_joint2
        index: 1
      - name: panda_joint3
        index: 2
      - name: panda_joint4
        index: 3
      - name: panda_joint5
        index: 4
      - name: panda_joint6
        index: 5
      - name: panda_joint7
        index: 6
      - name: panda_joint8
        index: 7
  
  JOINT_TARGET_POSITIONS:
    source: action
    format:
      action_type: RELATIVE
    mapping:
      - name: panda_joint1
        index: 0
      - name: panda_joint2
        index: 1
      - name: panda_joint3
        index: 2
      - name: panda_joint4
        index: 3
      - name: panda_joint5
        index: 4
      - name: panda_joint6
        index: 5
      - name: panda_joint7
        index: 6
      - name: panda_joint8
        index: 7

  END_EFFECTOR_POSES:
    source: observation.state
    format:
      ee_pose_type: JOINT_POSITIONS
    mapping:
      - name: panda_hand_tcp