input_dataset_name: bridge
dataset_type: RLDS

output_dataset:
  name: bridge
  tags: [widowx, bridge, manipulation]
  description: "The Bridge dataset (single-camera Berkeley Bridge release converted
  to TFDS, e.g. from Open X-Embodiment). Tabletop manipulation demos collected on
  a WidowX-250 robot, with a single 480x640 RGB camera, 7-D end-effector state
  (x, y, z, roll, pitch, yaw, gripper_open) and delta-EE actions.

. Dataset source: https://rail-berkeley.github.io/bridgedata/"

robot:
  name: widowx
  urdf_path: "neuracore/neuracore/importer/config/widowx.urdf"
  overwrite_existing: true

frequency: 5.0

data_import_config:
  RGB_IMAGES:
    source: observation
    format:
      image_convention: CHANNELS_LAST
      order_of_channels: RGB
    mapping:
      - name: image
        source_name: image

  END_EFFECTOR_POSES:
    source: observation.state
    format:
      pose_type: POSITION_ORIENTATION
      orientation:
        type: EULER
        euler_order: XYZ
        angle_units: RADIANS
    mapping:
      - name: end_effector
        index_range:
          start: 0
          end: 6

  PARALLEL_GRIPPER_OPEN_AMOUNTS:
    source: observation.state
    mapping:
      - name: gripper_open_amount
        index: 6

  LANGUAGE:
    source: observation
    format:
      language_type: BYTES
    mapping:
      - name: instruction
        source_name: natural_language_instruction
