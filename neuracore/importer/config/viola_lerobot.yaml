# VIOLA LeRobot mirror:
# https://huggingface.co/datasets/lerobot/viola
#
# This config is for comparing the LeRobot conversion against TFDS/RLDS VIOLA.
input_dataset_name: lerobot/viola
dataset_type: LEROBOT

output_dataset:
  name: viola_lerobot
  tags: [franka, kitchen, viola, imitation, lerobot]
  description: "VIOLA dataset in LeRobot format."

robot:
  name: franka_panda_viola
  urdf_path: "neuracore/importer/robots/franka_panda.urdf"
  overwrite_existing: true

frequency: 20.0

data_import_config:
  JOINT_POSITIONS:
    source: observation.state
    format:
      angle_units: RADIANS
    mapping:
      - name: panda_joint1
        index: 0
      - name: panda_joint2
        index: 1
      - name: panda_joint3
        index: 2
      - name: panda_joint4
        index: 3
      - name: panda_joint5
        index: 4
      - name: panda_joint6
        index: 5
      - name: panda_joint7
        index: 6

  PARALLEL_GRIPPER_OPEN_AMOUNTS:
    source: observation.state
    format:
      normalize:
        min: 0.0
        max: 0.08
    mapping:
      - name: gripper
        index: 7

  VISUAL_JOINT_POSITIONS:
    source: observation.state
    format:
      visual_joint_type: GRIPPER
      normalize:
        min: 0.0
        max: 0.08
    mapping:
      - name: panda_finger_joint1
        index: 7
      - name: panda_finger_joint2
        index: 7

  PARALLEL_GRIPPER_TARGET_OPEN_AMOUNTS:
    source: action
    format:
      invert_gripper_amount: true
    mapping:
      - name: gripper_target_open
        index: 6

  LANGUAGE:
    source: language_instruction
    format:
      language_type: STRING
    mapping:
      - name: instruction

  CUSTOM_1D:
    source: action
    mapping:
      - name: action_world_vector
        index_range:
          start: 0
          end: 3
      - name: action_rotation_delta
        index_range:
          start: 3
          end: 6
      - name: action_gripper_closedness
        index: 6
