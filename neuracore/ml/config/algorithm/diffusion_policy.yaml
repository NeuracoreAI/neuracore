# @package _global_
algorithm:
  _target_: neuracore.ml.algorithms.diffusion_policy.diffusion_policy.DiffusionPolicy
  hidden_dim: 256
  unet_down_dims: [256, 512, 1024]
  unet_kernel_size: 5
  unet_n_groups: 8
  unet_diffusion_step_embed_dim: 128
  unet_use_film_scale_modulation: true
  noise_scheduler_type: "DDPM"
  num_train_timesteps: 100
  num_inference_steps: 100
  beta_start: 0.0001
  beta_end: 0.02
  beta_schedule: "squaredcos_cap_v2"
  clip_sample: true
  clip_sample_range: 1.0
  lr: 1e-4
  lr_backbone: 0.0
  weight_decay: 1e-6
  optimizer_betas: [0.9, 0.999]
  optimizer_eps: 1e-8
  prediction_type: "epsilon"
  normalization_type: "min_max"  # Options: "mean_std" or "min_max"
